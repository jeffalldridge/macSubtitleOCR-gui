name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & test
    # macos-15 ships Xcode 16+ with Swift 6 (required by the macSubtitleOCR
    # submodule's swift-tools-version). macos-14 has Swift 5.10 and fails.
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Select Xcode 16
        run: |
          # Be explicit so we don't pick up an older Xcode if multiple are
          # installed on the runner image.
          sudo xcode-select -s /Applications/Xcode_16.2.app || \
            sudo xcode-select -s /Applications/Xcode_16.1.app || \
            sudo xcode-select -s /Applications/Xcode_16.0.app
          swift --version
          xcodebuild -version

      - name: Install runtime dep (mkvtoolnix)
        # Used at app runtime; tests don't strictly need it but keep parity
        # with end-user setup.
        run: brew install mkvtoolnix

      - name: Build (compiles upstream macSubtitleOCR + this app)
        run: make build

      - name: Test
        run: make test

      - name: Assemble .app (ad-hoc signed)
        run: make app

      - name: Smoke check the bundle
        run: |
          codesign --verify --verbose=1 build/macSubtitleOCR-gui.app
          # Confirm the bundled OCR binary is still functional
          build/macSubtitleOCR-gui.app/Contents/Resources/macSubtitleOCR --help | head -1
